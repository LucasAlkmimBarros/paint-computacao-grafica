# ============================================================
# GitHub Actions — Build executável Windows
# Gera: DesenhoComputacaoGrafica.exe  +  installer .exe (Inno Setup)
#
# Como usar:
#   1. Faça push no GitHub
#   2. Vá em Actions → "Build Windows Executable" → Run workflow
#   3. Baixe o artefato "windows-release" gerado
# ============================================================

name: Build Windows Executable

on:
  # Disparo manual pela interface do GitHub Actions
  workflow_dispatch:
  # Também dispara em push de tags "v*" (ex: v1.0.0)
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build no Windows
    runs-on: windows-latest

    steps:
      # 1. Faz checkout do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Configura Python 3.11 (compatível com customtkinter)
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instala dependências do projeto
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pyinstaller darkdetect

      # 4. Gera o executável .exe com PyInstaller
      #    --onefile   → tudo em um único .exe
      #    --windowed  → sem janela de console (GUI pura)
      #    --add-data  → inclui assets do customtkinter
      - name: Build com PyInstaller
        run: |
          $ctk_path = python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))"
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "DesenhoComputacaoGrafica" `
            --add-data "$ctk_path;customtkinter" `
            --hidden-import customtkinter `
            --hidden-import algorithms `
            --hidden-import transformations `
            main.py
        shell: pwsh

      # 5. Instala Inno Setup para criar o instalador
      - name: Instalar Inno Setup
        run: choco install innosetup --yes
        shell: pwsh

      # 6. Gera o script Inno Setup e compila o instalador
      - name: Criar instalador com Inno Setup
        run: |
          $iss = @"
          [Setup]
          AppName=Desenho Computacao Grafica
          AppVersion=1.0
          AppPublisher=PUC Minas
          DefaultDirName={autopf}\DesenhoComputacaoGrafica
          DefaultGroupName=Desenho CG
          OutputDir=installer
          OutputBaseFilename=DesenhoComputacaoGrafica_Setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern

          [Languages]
          Name: "brazilianportuguese"; MessagesFile: "compiler:Languages\BrazilianPortuguese.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Criar atalho na Área de Trabalho"; GroupDescription: "Ícones adicionais:"; Flags: unchecked

          [Files]
          Source: "dist\DesenhoComputacaoGrafica.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\Desenho Computacao Grafica"; Filename: "{app}\DesenhoComputacaoGrafica.exe"
          Name: "{userdesktop}\Desenho Computacao Grafica"; Filename: "{app}\DesenhoComputacaoGrafica.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\DesenhoComputacaoGrafica.exe"; Description: "Executar o programa"; Flags: nowait postinstall skipifsilent
          "@
          $iss | Out-File -FilePath "setup.iss" -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
        shell: pwsh

      # 7. Publica os artefatos para download
      - name: Upload dos artefatos
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/DesenhoComputacaoGrafica.exe
            installer/DesenhoComputacaoGrafica_Setup.exe
          retention-days: 30
